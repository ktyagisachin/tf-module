name: Publish Module to Azure DevOps Artifacts

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Zip Terraform Module
        run: |
          zip -r rg-module.zip rg_module/

      - name: Install Azure DevOps Extension
        run: |
          az extension add --name azure-devops --yes

      - name: Login to Azure DevOps
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.ADO_PAT }}
        run: |
          echo "Azure DevOps authentication configured"

      - name: Configure Azure DevOps Defaults
        run: |
          az devops configure \
            --defaults \
            organization=https://dev.azure.com/${{ secrets.ADO_ORG }} \
            project=${{ secrets.ADO_PROJECT }}

      - name: Debug Configuration
        run: |
          echo "ORG=${{ secrets.ADO_ORG }}"
          echo "PROJECT=${{ secrets.ADO_PROJECT }}"
          echo "FEED=${{ secrets.ADO_FEED }}"

      - name: Show Azure DevOps Defaults
        run: |
          az devops configure -l

      - name: Publish Package
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.ADO_PAT }}
        run: |
          az artifacts universal publish \
            --organization "https://dev.azure.com/${{ secrets.ADO_ORG }}" \
            --project "${{ secrets.ADO_PROJECT }}" \
            --scope project \
            --feed "${{ secrets.ADO_FEED }}" \
            --name "rg-module" \
            --version "1.0.${{ github.run_number }}" \
            --description "Terraform RG Module" \
            --path rg-module.zip \
            --debug
